# Test fixture — NOT the production allowlist. Designed to exercise
# parse/build helpers: plain domain, wildcard, CIDR, port override.
domains:
  - example.com
  - api.example.com
  - "*.wildcard.example.com"
cidrs:
  # Public-internet-ish ranges so the bogon filter in _valid_member
  # doesn't drop them. Python's ipaddress marks TEST-NET and 2001:db8::
  # as private/reserved, which the filter blocks.
  - 93.184.216.0/24
  - 2606:4700::/32
ports:
  default: [443]
  overrides:
    - match: example.com
      ports: [22, 443]
