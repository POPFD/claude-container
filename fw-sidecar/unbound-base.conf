# Base unbound configuration for the firewall sidecar. The
# reconciler generates /etc/unbound/unbound.conf.d/allowlist.conf
# with the per-domain forward-zones; this file establishes the
# surrounding server/remote-control scaffolding.

server:
    # Listen on loopback only. The devbox container shares this
    # netns, so 127.0.0.1:53 is reachable from devbox processes.
    interface: 127.0.0.1
    port: 53

    # Refuse queries from outside the shared netns. Belt-and-braces:
    # iptables already blocks external inbound.
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse

    # Minimal logging — one line per query at info. Useful for
    # auditing what tries to resolve.
    verbosity: 1
    log-queries: yes
    log-replies: no
    use-syslog: no
    logfile: ""

    # Don't cache negatives long — makes allowlist adds feel snappy.
    cache-max-negative-ttl: 30

    # Pull in the reconciler-generated file (default-refuse zone +
    # per-domain forward-zones).
    include: "/etc/unbound/unbound.conf.d/allowlist.conf"

remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    server-key-file:  "/etc/unbound/unbound_server.key"
    server-cert-file: "/etc/unbound/unbound_server.pem"
    control-key-file:  "/etc/unbound/unbound_control.key"
    control-cert-file: "/etc/unbound/unbound_control.pem"
